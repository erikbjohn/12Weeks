<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0f0e">
  <title>12 Weeks</title>
  <link rel="icon" href="/static/favicon.ico" sizes="32x32">
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/style.css?v=53">
</head>
<body>

<header>
  <div class="header-row">
    <h1>12 Weeks</h1>
    <div class="header-actions">
      <button class="header-btn" onclick="showProgress()" title="Progress">&#128200;</button>
      <button class="header-btn" onclick="toggleChatOverlay()" title="Coach">&#128172;</button>
      <button class="header-btn" onclick="toggleInviteDropdown()" title="Invite" id="invite-btn">&#9993;</button>
      <button class="header-btn" onclick="showSettingsMenu()" title="Settings">&#9881;</button>
    </div>
  </div>
  <div class="subtitle">Align aspirations with actions.</div>
</header>

<!-- COACH — first thing after the header, always visible -->
<div id="coach-top" class="coach-top-widget"></div>

<div id="invite-dropdown" class="invite-dropdown"></div>
<div id="baseline-overlay"></div>
<div id="morning-checkin-overlay"></div>

<div class="readiness-alert" id="readiness-alert"></div>
<div id="milestone-banner"></div>
<div id="today-nav" class="today-nav"></div>
<div id="today-hero" class="today-hero"></div>

<div class="detail-panel" id="detail-panel"></div>
<div id="weighin-bar" class="weighin-bar"></div>
<div id="checkin-summary-bar"></div>
<div class="garmin-bar" id="garmin-bar"></div>
<div id="supplement-bar" class="supplement-bar"></div>
<!-- Legacy containers kept for renderAll compatibility -->
<div class="phase-nav" id="phase-nav" style="display:none"></div>
<div class="phase-banner" id="phase-banner" style="display:none"></div>
<div class="week-tabs" id="week-tabs" style="display:none"></div>
<div class="day-grid" id="day-grid" style="display:none"></div>

<!-- Progress Dashboard Overlay -->
<div class="progress-overlay" id="progress-overlay"></div>

<!-- Garmin Login Modal -->
<div class="modal-overlay" id="garmin-modal">
  <div class="modal">
    <h2>Connect Garmin</h2>
    <input type="email" id="garmin-email" placeholder="Garmin email" autocomplete="email">
    <input type="password" id="garmin-password" placeholder="Password" autocomplete="current-password">
    <input type="text" id="garmin-mfa" placeholder="Verification code" autocomplete="one-time-code" inputmode="numeric" style="display:none">
    <div class="modal-error" id="garmin-error"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="garmin-submit" onclick="garminLogin()">Connect</button>
    </div>
  </div>
</div>

<div id="chat-overlay"></div>

<script>
// Force-clear old service worker caches so updated assets load
if ('caches' in window) {
  caches.keys().then(names => names.forEach(n => caches.delete(n)));
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.update());
  });
  // Auto-reload when new service worker takes control
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
</script>
<script src="/static/app.js?v=53"></script>
</body>
</html>
